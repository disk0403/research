# Place recognition models
cosplace:
  output: "global-feats-cosplace"
  model:
    name: "cosplace"
    backbone: "EfficientNet_B0"
    fc_output_dim: 512
    checkpoint_path: "efficientnet_85x85.pth"

cosplace_hub:
  output: "global-feats-cosplace_hub"
  model:
    name: "cosplace_hub"
    source: "gmberton/CosPlace"
    backbone: "ResNet50"
    fc_output_dim: 512
    torch_hub_dir: "model_weights/torch_hub_checkpoints"

selavpr:
  output: "global-feats-selavpr"
  model:
    name: "selavpr"
    backbone: "EfficientNet_B0"
    fc_output_dim: 512
    checkpoint_path: "sela.pth"

